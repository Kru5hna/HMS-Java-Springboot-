server:
  port: 8084

spring:
  application:
    name: APPOINTMENT-SERVICE
  datasource:
    url: jdbc:mysql://localhost:3306/appointment_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka

security:
  jwt:
    secret: VGhpc0lzQVNlY3VyZUxvbmdCYXNlNjRTZWNyZXRLZXlGb3JITVNKV1QxMjM0NQ==
    expiration-ms: 86400000

management:
  endpoints:
    web:
      exposure:
        include: health,info
