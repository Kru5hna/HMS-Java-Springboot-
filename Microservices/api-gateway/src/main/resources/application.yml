server:
  port: 8080

spring:
  application:
    name: API-GATEWAY
  cloud:
    gateway:
      routes:
        - id: auth-service-route
          uri: lb://AUTH-SERVICE
          predicates:
            - Path=/auth/**
        - id: patient-service-route
          uri: lb://PATIENT-SERVICE
          predicates:
            - Path=/api/patients/**, /api/beds/**, /api/activities/**
        - id: doctor-service-route
          uri: lb://DOCTOR-SERVICE
          predicates:
            - Path=/api/doctors/**
        - id: appointment-service-route
          uri: lb://APPOINTMENT-SERVICE
          predicates:
            - Path=/api/appointments/**

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka

management:
  endpoints:
    web:
      exposure:
        include: health,info
